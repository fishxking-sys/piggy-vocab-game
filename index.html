<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGSL 詞彙構築器 - 終極 AI 獎勵版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .hidden-phase { display: none !important; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        @keyframes bounce-scale { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pulse-slow { animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .animate-bounce-scale { animation: bounce-scale 1s infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col items-center py-6 px-4">

    <header class="w-full max-w-2xl bg-white p-5 rounded-3xl shadow-sm mb-6 relative overflow-hidden">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-indigo-600 flex items-center gap-2 mb-1">豬豬詞彙挑戰</h1>
                <span id="db-status" class="text-xs text-slate-400 font-medium bg-slate-100 px-2 py-1 rounded-md">讀取中...</span>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="openCalendar()" class="flex items-center gap-2 text-amber-600 font-bold bg-amber-50 hover:bg-amber-100 px-4 py-2.5 rounded-xl transition-colors border border-amber-200 shadow-sm">
                    🔥 <span id="streak-display">0</span>日 <span class="text-slate-300">|</span> 💰 $<span id="cash-display">0</span>
                </button>
                <button onclick="openWordBank()" class="flex items-center gap-2 text-indigo-600 font-bold bg-indigo-50 hover:bg-indigo-100 px-4 py-2.5 rounded-xl transition-colors">
                    字庫 (<span id="total-words-count">0</span>)
                </button>
            </div>
        </div>
        <div class="w-full bg-slate-100 rounded-full h-3 mb-1 overflow-hidden">
            <div id="daily-progress-bar" class="bg-emerald-400 h-3 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
        <div class="flex justify-between items-center text-sm font-bold">
            <span class="text-slate-500">今日目標進度</span>
            <span id="daily-text-status" class="text-emerald-500">0 / 5</span>
        </div>
    </header>

    <main class="w-full max-w-2xl flex flex-col items-center">
        <div id="study-phase" class="w-full animate-fade-in-up hidden-phase">
            <div class="bg-white p-8 rounded-3xl shadow-sm text-center border-2 border-indigo-50">
                <h2 id="study-word" class="text-4xl font-black text-slate-800 mb-2">WORD</h2>
                <button onclick="speakWord()" class="mb-4 p-2 bg-indigo-100 text-indigo-600 rounded-full hover:bg-indigo-200 transition-colors">🔊</button>
                <p id="study-chinese" class="text-xl font-bold text-indigo-600 mb-4"></p>
                <div id="study-sentence" class="bg-slate-50 p-4 rounded-2xl text-left mb-6"></div>

                <div class="flex flex-col gap-3 mb-8">
                    <div class="text-sm font-bold text-slate-400 uppercase tracking-widest flex items-center justify-center gap-2">
                        <span class="w-8 h-px bg-slate-200"></span>AI 學習助手<span class="w-8 h-px bg-slate-200"></span>
                    </div>
                    <button onclick="generateAIStory()" class="w-full py-3 bg-purple-50 hover:bg-purple-100 text-purple-700 font-bold rounded-xl border border-purple-200 transition-colors">✨ 創作專屬豬豬故事</button>
                    <div id="ai-story-container" class="text-left text-sm text-slate-700 bg-purple-50 p-4 rounded-xl border border-purple-100 hidden-phase leading-relaxed"></div>

                    <button onclick="generateAIMnemonic()" class="w-full py-3 bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold rounded-xl border border-blue-200 transition-colors">✨ 教我 AI 記憶秘訣</button>
                    <div id="ai-mnemonic-container" class="text-left text-sm text-slate-700 bg-blue-50 p-4 rounded-xl border border-blue-100 hidden-phase leading-relaxed"></div>
                </div>

                <button onclick="startSpelling()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl text-lg hover:bg-indigo-700 transition-transform active:scale-95 shadow-lg shadow-indigo-200">開始拼寫！</button>
            </div>
        </div>

        <div id="spelling-phase" class="w-full hidden-phase">
            <div class="w-full bg-white p-6 rounded-3xl shadow-sm mb-8 text-center border-2 border-slate-50 relative">
                <button onclick="backToStudy()" class="absolute left-4 top-1/2 -translate-y-1/2 p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-indigo-100 hover:text-indigo-600 transition-colors active:scale-95 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <span id="spelling-chinese" class="text-xl font-bold text-indigo-600"></span>
            </div>
            
            <div id="slots-container" class="flex flex-wrap justify-center gap-2 mb-10 min-h-[3.5rem]"></div>
            <div id="pool-container" class="flex flex-wrap justify-center gap-2"></div>
            
            <div id="success-area" class="hidden-phase text-center mt-6 w-full animate-fade-in-up">
                <div id="daily-goal-celebration" class="hidden-phase w-full text-center bg-gradient-to-r from-emerald-50 to-emerald-100 border-2 border-emerald-400 p-4 rounded-2xl mb-6 shadow-md">
                    <span class="text-xl font-black text-emerald-600">🌟 恭喜達成今日 5 字目標！ 🌟</span>
                </div>
                <div id="cash-reward-celebration" class="hidden-phase w-full text-center bg-gradient-to-r from-amber-100 to-yellow-300 border-4 border-yellow-500 p-6 rounded-2xl mb-6 shadow-xl animate-bounce-scale">
                    <span class="text-2xl font-black text-rose-600 block mb-1">🎉 獎勵解鎖！ 🎉</span>
                    <span class="text-lg font-bold text-amber-800 block">達成連續 5 日挑戰，獲得 $100 現金獎賞！💰</span>
                </div>

                <div class="text-2xl font-bold text-emerald-500 mb-6">🎉 完美拼出！</div>
                <button onclick="pickNextWord()" class="px-10 py-4 bg-emerald-500 text-white rounded-2xl font-bold text-lg hover:bg-emerald-600 transition-transform active:scale-95 shadow-lg shadow-emerald-200">學習下一題</button>
            </div>
        </div>
    </main>

    <div id="calendar-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden-phase transition-opacity">
        <div class="bg-white w-11/12 max-w-md h-auto max-h-[85vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-fade-in-up">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-amber-50">
                <h2 class="text-2xl font-black text-amber-600 flex items-center gap-2">💰 獎勵日曆</h2>
                <button onclick="closeCalendar()" class="p-2 bg-white text-slate-600 rounded-full hover:bg-rose-100 hover:text-rose-600 shadow-sm transition-colors">✖</button>
            </div>
            <div class="p-6 overflow-y-auto flex flex-col gap-6">
                <div class="flex gap-4">
                    <div class="flex-1 bg-slate-50 border border-slate-200 rounded-2xl p-4 text-center">
                        <div class="text-sm font-bold text-slate-500 mb-1">虛擬錢包</div>
                        <div class="text-3xl font-black text-emerald-500">$<span id="modal-cash-display">0</span></div>
                    </div>
                    <div class="flex-1 bg-amber-50 border border-amber-200 rounded-2xl p-4 text-center">
                        <div class="text-sm font-bold text-amber-600 mb-1">連續打卡</div>
                        <div class="text-3xl font-black text-amber-500"><span id="modal-streak-display">0</span> 日</div>
                    </div>
                </div>
                <div class="bg-white border-2 border-slate-100 rounded-2xl p-5">
                    <div class="text-center font-bold text-slate-700 mb-4">下一階段獎賞 ($100) 距離：</div>
                    <div class="flex justify-between items-center relative z-10" id="streak-circles-container"></div>
                    <div class="h-2 bg-slate-100 rounded-full -mt-5 relative z-0 mx-4"></div>
                </div>
                <div class="bg-white border-2 border-slate-100 rounded-2xl p-5">
                    <div class="font-bold text-slate-700 mb-3 text-center">最近 7 日打卡紀錄</div>
                    <div class="flex justify-between" id="mini-calendar-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="word-bank-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden-phase transition-opacity">
        <div class="bg-white w-11/12 max-w-lg md:max-w-2xl h-[85vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-fade-in-up">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-2xl font-black text-indigo-600">我的專屬字詞庫</h2>
                <button onclick="closeWordBank()" class="p-2 bg-slate-200 text-slate-600 rounded-full hover:bg-rose-100 hover:text-rose-600 transition-colors">✖</button>
            </div>
            <div id="word-bank-list" class="flex-1 p-6 overflow-y-auto bg-slate-50 flex flex-col gap-4 no-scrollbar"></div>
        </div>
    </div>

    <script>
        // --- 核心變數與 API ---
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_ReKq_x8fDAo-QsmQ_RJRC7i41IXhQ079fb94Y3BbcMfu4cPPgQJjeKxW1B9V-OfO4lxF90WXGaok/pub?output=csv"; 
        const apiKey = ""; // 放入你的 Gemini API Key
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";
        
        let wordDatabase = [], availableWords = [], currentWord = null, gameState = 'loading', selectedLetters = [], scrambledLetters = [];
        const DAILY_TARGET = 5;
        let dailyCount = 0, wordBank = [], completedHistory = {}, currentStreak = 0, totalCash = 0;

        // --- 工具與存儲邏輯 ---
        function getLocalYMD(dateObj) {
            const offset = dateObj.getTimezoneOffset();
            return new Date(dateObj.getTime() - (offset*60*1000)).toISOString().split('T')[0];
        }

        function calculateStreak(historyObj) {
            let streak = 0, checkDate = new Date();
            if (!historyObj[getLocalYMD(checkDate)]) checkDate.setDate(checkDate.getDate() - 1);
            while (historyObj[getLocalYMD(checkDate)]) {
                streak++;
                checkDate.setDate(checkDate.getDate() - 1);
            }
            return streak;
        }

        function initStorage() {
            const todayStr = getLocalYMD(new Date());
            try { wordBank = JSON.parse(localStorage.getItem('ngsl_word_bank')) || []; } catch(e) { wordBank = []; }
            try { completedHistory = JSON.parse(localStorage.getItem('ngsl_history')) || {}; } catch(e) { completedHistory = {}; }
            totalCash = parseInt(localStorage.getItem('ngsl_cash')) || 0;

            const storedDate = localStorage.getItem('ngsl_daily_date');
            if (storedDate === todayStr) {
                dailyCount = parseInt(localStorage.getItem('ngsl_daily_count')) || 0;
            } else {
                dailyCount = 0;
                localStorage.setItem('ngsl_daily_date', todayStr);
                localStorage.setItem('ngsl_daily_count', dailyCount);
            }

            currentStreak = calculateStreak(completedHistory);
            updateDailyUI();
            updateRewardsUI();
        }

        // --- UI 更新邏輯 ---
        function updateDailyUI() {
            document.getElementById('total-words-count').innerText = wordBank.length;
            const progressPercent = Math.min((dailyCount / DAILY_TARGET) * 100, 100);
            const bar = document.getElementById('daily-progress-bar');
            const textStatus = document.getElementById('daily-text-status');
            
            bar.style.width = `${progressPercent}%`;
            if (dailyCount >= DAILY_TARGET) {
                bar.classList.replace('bg-emerald-400', 'bg-amber-400');
                textStatus.innerHTML = `<span class="text-amber-500">已達標 🔥 (${dailyCount})</span>`;
            } else {
                bar.classList.replace('bg-amber-400', 'bg-emerald-400');
                textStatus.innerHTML = `<span class="text-emerald-500">${dailyCount} / ${DAILY_TARGET}</span>`;
            }
        }

        function updateRewardsUI() {
            document.getElementById('cash-display').innerText = totalCash;
            document.getElementById('modal-cash-display').innerText = totalCash;
            document.getElementById('streak-display').innerText = currentStreak;
            document.getElementById('modal-streak-display').innerText = currentStreak;
            
            let streakProgress = currentStreak % 5;
            if (currentStreak > 0 && streakProgress === 0) streakProgress = 5; 
            
            let circlesHtml = '';
            for(let i=1; i<=5; i++) {
                if (i <= streakProgress) circlesHtml += `<div class="w-8 h-8 rounded-full bg-amber-400 text-white flex items-center justify-center font-bold">✓</div>`;
                else if (i === 5) circlesHtml += `<div class="w-10 h-10 rounded-full bg-white border-4 border-amber-300 text-amber-500 flex items-center justify-center text-xl">💰</div>`;
                else circlesHtml += `<div class="w-8 h-8 rounded-full bg-slate-200 border-2 border-white flex items-center justify-center text-slate-400 text-xs">${i}</div>`;
            }
            document.getElementById('streak-circles-container').innerHTML = circlesHtml;

            let miniCalHtml = '';
            for(let i=6; i>=0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let dStr = getLocalYMD(d);
                let dayName = d.toLocaleDateString('zh-HK', { weekday: 'short' }).replace('星期', '');
                let isDone = completedHistory[dStr];
                miniCalHtml += `<div class="flex flex-col items-center gap-1"><div class="text-xs text-slate-400">${dayName}</div><div class="w-8 h-8 rounded-lg flex items-center justify-center font-bold ${isDone ? 'bg-emerald-400 text-white' : 'bg-slate-100 text-slate-300'}">${isDone ? '✓' : ''}</div></div>`;
            }
            document.getElementById('mini-calendar-container').innerHTML = miniCalHtml;
        }

        function handleWordSuccess() {
            // 加入字庫
            const wordExists = wordBank.some(item => item.word.toUpperCase() === currentWord.word.toUpperCase());
            if (!wordExists) {
                wordBank.push({
                    word: currentWord.word.toUpperCase(), chinese: currentWord.chinese, hint: currentWord.hint, pos: currentWord.pos, hint_chinese: currentWord.hint_chinese || ''
                });
                localStorage.setItem('ngsl_word_bank', JSON.stringify(wordBank));
            }

            dailyCount++;
            localStorage.setItem('ngsl_daily_count', dailyCount);
            updateDailyUI();

            if (dailyCount === DAILY_TARGET) {
                const todayStr = getLocalYMD(new Date());
                completedHistory[todayStr] = true;
                localStorage.setItem('ngsl_history', JSON.stringify(completedHistory));
                currentStreak = calculateStreak(completedHistory);
                
                if (currentStreak > 0 && currentStreak % 5 === 0) {
                    totalCash += 100;
                    localStorage.setItem('ngsl_cash', totalCash);
                    document.getElementById('cash-reward-celebration').classList.remove('hidden-phase');
                    fireConfetti(true); 
                } else {
                    document.getElementById('daily-goal-celebration').classList.remove('hidden-phase');
                    fireConfetti(false); 
                }
                updateRewardsUI();
            }
        }

        function fireConfetti(isBigReward) {
            if (typeof confetti !== 'function') return;
            var duration = isBigReward ? 4000 : 2000;
            var end = Date.now() + duration;
            var colors = isBigReward ? ['#fbbf24', '#f59e0b', '#e11d48'] : ['#4f46e5', '#10b981', '#f59e0b'];
            (function frame() {
                confetti({ particleCount: isBigReward ? 8 : 4, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: isBigReward ? 8 : 4, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // --- Modals 控制 ---
        function openCalendar() { updateRewardsUI(); document.getElementById('calendar-modal').classList.remove('hidden-phase'); }
        function closeCalendar() { document.getElementById('calendar-modal').classList.add('hidden-phase'); }
        function openWordBank() {
            document.getElementById('word-bank-modal').classList.remove('hidden-phase');
            const listContainer = document.getElementById('word-bank-list');
            if (wordBank.length === 0) { listContainer.innerHTML = '<div class="text-center text-slate-400 mt-10">字典空空如也</div>'; return; }
            listContainer.innerHTML = [...wordBank].reverse().map(item => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <div class="font-black text-xl text-slate-800">${item.word.toLowerCase()}</div>
                    <div class="text-indigo-600 font-bold mb-1">${item.chinese}</div>
                    <div class="text-sm text-slate-500 italic">"${item.hint.replace('______', `<span class="underline">${item.word.toLowerCase()}</span>`)}"</div>
                    ${item.hint_chinese ? `<div class="mt-2 p-2 bg-slate-100 rounded text-sm text-slate-600 font-medium">中譯：${item.hint_chinese}</div>` : ''}
                </div>`).join('');
        }
        function closeWordBank() { document.getElementById('word-bank-modal').classList.add('hidden-phase'); }

        // --- AI API 呼叫 ---
        async function fetchGeminiAPI(promptText) {
            if(!apiKey) return "⚠️ 請先在代碼中填入 apiKey 才能使用 AI 功能！";
            const delays = [1000, 2000, 4000];
            const payload = { contents: [{ parts: [{ text: promptText }] }], systemInstruction: { parts: [{ text: "你是一位有趣、幽默、充滿創意的香港英文老師。請使用繁體中文（可適當加入一點點香港口語令語氣更親切）回答。回覆要盡量簡短、排版清晰易讀。" }] } };
            for (let i = 0; i < delays.length; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return (await response.json()).candidates[0].content.parts[0].text;
                } catch (error) {
                    if (i === delays.length - 1) return "哎呀，AI 老師暫時有少少塞車，請稍後再試！🙏";
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }
        async function generateAIStory() {
            const container = document.getElementById('ai-story-container');
            container.classList.remove('hidden-phase');
            container.innerHTML = `<div class="animate-pulse-slow text-purple-500 font-bold">✨ Gemini 正在為豬豬編寫劇本...</div>`;
            const resultText = await fetchGeminiAPI(`請為單字 "${currentWord.word}" (中文: ${currentWord.chinese}) 創作一個極短的雙語小故事（最多 3 句）。主角必須是「豬豬」(Piggy)，內容要搞笑可愛。請將目標單字加粗顯示。`);
            container.innerHTML = resultText.replace(/\*\*(.*?)\*\*/g, '<strong class="text-purple-700 bg-purple-100 px-1 rounded">$1</strong>').replace(/\n/g, '<br>');
        }
        async function generateAIMnemonic() {
            const container = document.getElementById('ai-mnemonic-container');
            container.classList.remove('hidden-phase');
            container.innerHTML = `<div class="animate-pulse-slow text-blue-500 font-bold">✨ Gemini 正在翻查記憶秘笈...</div>`;
            const resultText = await fetchGeminiAPI(`請提供一個有趣且容易記住的方法來拼寫英文單字 "${currentWord.word}" (中文: ${currentWord.chinese})。可以使用字根、諧音或聯想。只需要最精華的記憶法。`);
            container.innerHTML = resultText.replace(/\*\*(.*?)\*\*/g, '<strong class="text-blue-700">$1</strong>').replace(/\n/g, '<br>');
        }
        function resetAIContainers() {
            document.getElementById('ai-story-container').classList.add('hidden-phase'); document.getElementById('ai-story-container').innerHTML = '';
            document.getElementById('ai-mnemonic-container').classList.add('hidden-phase'); document.getElementById('ai-mnemonic-container').innerHTML = '';
        }

        // --- 核心遊戲流程 ---
        function initGame() {
            initStorage();
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    wordDatabase = results.data.filter(row => row.word && row.word.trim() !== "");
                    document.getElementById('db-status').innerText = "☁️ 雲端字庫載入成功";
                    resetAvailableWords();
                    nextWordLogic();
                }
            });
        }

        function resetAvailableWords() { availableWords = [...wordDatabase].sort(() => Math.random() - 0.5); }

        function nextWordLogic() {
            if (availableWords.length === 0) resetAvailableWords();
            currentWord = availableWords.pop();
            const letters = currentWord.word.toLowerCase().split('').map((c, i) => ({id: i, char: c}));
            scrambledLetters = [...letters].sort(() => Math.random() - 0.5);
            selectedLetters = [];
            gameState = 'study';
            
            document.getElementById('daily-goal-celebration').classList.add('hidden-phase');
            document.getElementById('cash-reward-celebration').classList.add('hidden-phase');
            resetAIContainers();
            updateUI();
        }

        function updateUI() {
            if(gameState === 'study') {
                document.getElementById('study-phase').classList.remove('hidden-phase');
                document.getElementById('spelling-phase').classList.add('hidden-phase');
                document.getElementById('study-word').innerText = currentWord.word.toLowerCase();
                document.getElementById('study-chinese').innerText = currentWord.chinese;
                const engSentence = currentWord.hint.replace('______', `<span class="text-indigo-600 font-bold underline decoration-2 underline-offset-4 px-1">${currentWord.word.toLowerCase()}</span>`);
                document.getElementById('study-sentence').innerHTML = `<p class="italic text-lg text-slate-700">"${engSentence}"</p>${currentWord.hint_chinese ? `<p class="mt-3 text-sm font-medium text-slate-500 bg-white p-2 rounded inline-block">中譯：${currentWord.hint_chinese}</p>` : ''}`;
            } else {
                document.getElementById('study-phase').classList.add('hidden-phase');
                document.getElementById('spelling-phase').classList.remove('hidden-phase');
                document.getElementById('spelling-chinese').innerText = currentWord.chinese;
                renderSpelling();
            }
        }

        function renderSpelling() {
            document.getElementById('slots-container').innerHTML = currentWord.word.split('').map((_, i) => `<div class="w-12 h-14 md:w-16 md:h-16 bg-slate-200 text-slate-800 text-2xl font-black rounded-2xl flex items-center justify-center shadow-inner transition-all">${selectedLetters[i]?.char || '_'}</div>`).join('');
            document.getElementById('pool-container').innerHTML = scrambledLetters.map((l, i) => `<button onclick="pick(${i})" class="w-12 h-14 md:w-16 md:h-16 bg-white border-2 border-slate-200 text-slate-700 text-2xl font-black rounded-2xl shadow-sm hover:border-indigo-400 hover:text-indigo-600 hover:-translate-y-1 transition-all active:scale-95">${l.char}</button>`).join('');
        }

        function pick(idx) {
            if(selectedLetters.length < currentWord.word.length) {
                selectedLetters.push(scrambledLetters[idx]);
                scrambledLetters.splice(idx, 1);
                
                if(selectedLetters.length === currentWord.word.length) {
                    document.getElementById('pool-container').classList.add('hidden-phase');
                    document.getElementById('success-area').classList.remove('hidden-phase');
                    speakWord();
                    handleWordSuccess(); // 儲存紀錄、計連續日數及派彩紙
                }
                renderSpelling();
            }
        }

        function pickNextWord() {
            document.getElementById('pool-container').classList.remove('hidden-phase');
            document.getElementById('success-area').classList.add('hidden-phase');
            nextWordLogic();
        }

        function backToStudy() {
            const letters = currentWord.word.toLowerCase().split('').map((c, i) => ({id: i, char: c}));
            scrambledLetters = [...letters].sort(() => Math.random() - 0.5);
            selectedLetters = [];
            document.getElementById('pool-container').classList.remove('hidden-phase');
            document.getElementById('success-area').classList.add('hidden-phase');
            gameState = 'study';
            updateUI();
        }

        function speakWord() { 
            if('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(currentWord.word);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }
        
        function startSpelling() { gameState = 'spelling'; updateUI(); }
        window.onload = initGame;
    </script>
</body>
</html>
